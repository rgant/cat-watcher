name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install shfmt (not on conda-forge; everything else comes from pixi)
        run: sudo apt-get update && sudo apt-get install -y shfmt

      - name: Set up pixi
        # Materializes the locked environment from pixi.lock; conda-forge supplies Python 3.14,
        # ffmpeg, shellcheck, dprint, markdownlint-cli, actionlint, zizmor, and the rest of the
        # toolchain so CI doesn't need separate curl / pipx installs.
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          run-install: true
          frozen: true

      - name: Set up Node.js for stylelint/eslint
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install Node tooling (stylelint + eslint, hosted in package.json)
        run: npm ci

      - name: Lint (full pre-commit suite — formatters as checks, plus all validators)
        run: pixi run pre-commit run --all-files --show-diff-on-failure

      - name: Test (pytest with coverage; fail_under=90 enforced via pyproject.toml)
        run: pixi run pytest --cov --cov-report=term-missing
