  "too-many-arguments",                    # Duplicated with Ruff (PLR0913)
  # "too-many-boolean-expressions",        # Duplicated with Ruff (PLR0916)
  # "too-many-positional-arguments",       # Duplicated with Ruff (PLR0917)
  "too-many-branches",                     # Duplicated with Ruff (PLR0912)
  # "too-many-locals",                     # Duplicated with Ruff (PLR0914)
  "too-many-nested-blocks",                # Duplicated with Ruff (PLR1702)
  # "too-many-public-methods",             # Duplicated with Ruff (PLR0904)
  "too-many-return-statements",            # Duplicated with Ruff (PLR0911)
  "too-many-statements",                   # Duplicated with Ruff (PLR0915)
  "trailing-comma-tuple",                  # Duplicated with Ruff (COM818)
  "unnecessary-comprehension",             # Duplicated with Ruff (C416)
  "use-a-generator",                       # Duplicated with Ruff (C419)
  "unnecessary-dict-index-lookup",         # Duplicated with Ruff (PLR1733)
  "use-list-literal",                      # Duplicated with Ruff (C405)
  "use-dict-literal",                      # Duplicated with Ruff (C406)
  "unnecessary-list-index-lookup",         # Duplicated with Ruff (PLR1736)
  "use-yield-from",                        # Duplicated with Ruff (UP028)
  "use-set-for-membership",                # Duplicated with Ruff (PLR6201)
  "useless-object-inheritance",            # Duplicated with Ruff (UP004)
  "useless-option-value",
  "useless-return",                        # Duplicated with Ruff (PLR1711)
  # Project Customizations
  "too-few-public-methods",                # Data classes don't need methods
]
enable = [ "c-extension-no-member", "useless-suppression" ]
# Test files routinely access private members and use late imports for patching.
# redefined-outer-name: pytest fixtures shadow module-scope definitions by design.
per-file-ignores = [
  "**/tests/**/*.py:protected-access,import-outside-toplevel,redefined-outer-name",
]
[tool.pylint.method_args]
timeout-methods = [
  "requests.api.delete",
  "requests.api.get",
  "requests.api.head",
  "requests.api.post",
  "requests.api.put",
]
[tool.pylint.string]
# Conflicts with ruff - ruff allows single quotes inside f-strings when outer string uses double quotes
check-quote-consistency = false
[tool.pylint.typecheck]
# Alembic's `op` and `context` are runtime proxies whose members are attached dynamically; pylint's
# static analysis can't see them and trips no-member on every migration helper call. Telling pylint
# to skip member checks for the modules entirely is the documented escape hatch.
ignored-modules = [ "alembic.context", "alembic.op" ]

[tool.pyproject-fmt]
keep_full_version = true
generate_python_version_classifiers = false
table_format = "long"
collapse_tables = [ "project.authors" ]

[tool.mypy]
disallow_any_unimported = true
files = [ "src", "tests" ]
# ``tests/fixtures`` mirrors ``[tool.pytest.ini_options].pythonpath`` so mypy resolves
# ``from make_clip import make_clip`` in tests/conftest.py the same way pytest does.
mypy_path = [ "src", "tests/fixtures" ]
show_column_numbers = true
strict = true
warn_unreachable = true

[tool.pytest.ini_options]
# Show logs during test runs for better debugging
log_cli = false  # pytest -o log_cli=true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)8s] %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"
addopts = [
  "--import-mode=importlib", # See: https://docs.pytest.org/en/stable/explanation/pythonpath.html#import-modes
  "--strict-config",         # Error on unknown configuration options
  "--strict-markers",        # Require all @pytest.mark.* decorators to be registered (prevents typos)
  "--tb=short",              # Shorter traceback format for cleaner output
  "-ra",                     # Show summary of all test outcomes (passed, failed, skipped, etc.)
]
testpaths = [ "tests" ]
# Put tests/fixtures on sys.path so conftest can ``from make_clip import make_clip`` directly,
# bypassing the ``tests`` namespace (which a third-party package — ultralytics — shadows by
# shipping its own ``tests/__init__.py`` in site-packages).
pythonpath = [ "tests/fixtures" ]
filterwarnings = [
  "error", # Treat warnings as errors to catch issues early
]

[tool.coverage.report]
fail_under = 90
exclude_lines = [
  "@overload",
  "pragma: no cover",
  "if TYPE_CHECKING:",
]
[tool.coverage.run]
branch = true
source = [ "src" ]
omit = [ "**/test_*.py", "**/tests/*" ]

[tool.basedpyright]
# Pixi-managed virtualenv; required so basedpyright can resolve installed dependencies.
venvPath = ".pixi/envs/"
venv = "default"
# Disabled because ruff's ISC001 is also ignored project-wide (it conflicts with the formatter).
# Both tools agree to not flag implicit string concatenation.
reportImplicitStringConcatenation = false
# Mirrors ``[tool.pytest.ini_options].pythonpath`` so basedpyright resolves
# ``from make_clip import make_clip`` in tests/conftest.py the same way pytest does at runtime.
extraPaths = [ "tests/fixtures" ]
exclude = [
  "**/.*",
  "**/__pycache__",
]
# Tests may access ``_underscored`` private members of the modules they exercise; this is the
# basedpyright analog of ruff's ``SLF001`` per-file-ignore for tests.
executionEnvironments = [
  { root = "tests", reportPrivateUsage = "none" },
]
