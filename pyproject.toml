[build-system]
build-backend = "hatchling.build"
requires = [ "hatchling" ]

[project]
name = "cat-watcher"
version = "0.1.0"
description = "Monitor indoor litter-box cameras: ingest, classify, alert, browse."
readme = "README.md"
license = { text = "AGPL-3.0-or-later" }
authors = [ { name = "J Rob Gant", email = "rgant@alum.wpi.edu" } ]
requires-python = ">=3.14"
dependencies = [
  "alembic>=1.18.4,<2",
  "fastapi[standard]>=0.136.1,<0.137",
  "httpx>=0.28.1,<0.29",
  "jinja2>=3.1.6,<4",
  "pydantic-settings>=2.14.0,<3",
  "sqlalchemy>=2.0.49,<3",
  "uvicorn[standard]>=0.46.0,<0.47",
]
[project.scripts]
cat-watcher = "cat_watcher.__main__:main"
cat-watcher-poller = "cat_watcher.poller:main"
cat-watcher-alerts = "cat_watcher.alerts:main"
cat-watcher-web = "cat_watcher.web.app:main"
cat-watcher-backup = "cat_watcher.backup:main"

[dependency-groups]
dev = [
  "aiosmtpd",
  "basedpyright",
  "mypy",
  "pylint",
  "pylint-per-file-ignores",
  "pylint-pytest>=2.0.0a1",
  "pylint-venv",
  "pyproject-fmt",
  "pytest",
  "pytest-cov",
  "pytest-mock",
  "pytest-randomly",
  "respx",
  "ruff",
]

[tool.pixi.dependencies]
python = "3.14.*"
ffmpeg = ">=8.1.1,<9"
numpy = ">=2.4.3,<3"
opencv = ">=4.13.0,<5"
pytorch = ">=2.10.0,<3"
torchvision = "==0.25"  # version required for pytorch 2.10, conda doesn't have 2.11 yet.
ultralytics = ">=8.4.46,<9"
[tool.pixi.environments]
default = { features = [ "dev" ], solve-group = "default" }
[tool.pixi.pypi-dependencies]
cat-watcher = { path = ".", editable = true }
[tool.pixi.tasks.agents-status]
cmd = "launchctl list | grep cat-watcher"
description = "Show status of cat-watcher launchd agents"
[tool.pixi.tasks.alerts-once]
cmd = "cat-watcher-alerts --once"
description = "Run alerts pipeline once (no daemon)"
[tool.pixi.tasks.check]
cmd = "pytest"
depends-on = [ "format", "lint" ]
description = "CI gate: format + lint + test"
[tool.pixi.tasks.clean]
cmd = """\
  find . -type d \\( -name __pycache__ -o -name .pytest_cache -o -name .mypy_cache -o -name .ruff_cache \\) -exec rm -rf {} + 2>/dev/null
  find . -type f -name '*.pyc' -delete 2>/dev/null
  true \
  """
description = "Delete Python/pytest/mypy/ruff cache directories"
[tool.pixi.tasks.db-downgrade]
cmd = "alembic downgrade -1"
description = "Roll back one alembic migration"
[tool.pixi.tasks.db-revision]
cmd = 'alembic revision --autogenerate -m "{{ message }}"'
args = [ { arg = "message", default = "" } ]
description = 'Create alembic auto-revision; pass message="..."'
[tool.pixi.tasks.db-upgrade]
cmd = "alembic upgrade head"
description = "Apply pending alembic migrations to head"
[tool.pixi.tasks.deploy-update]
cmd = """\
  ssh media-center 'set -e
  cd ~/Programming/cat-watcher \
    && git pull \
    && pixi install \
    && pixi run alembic upgrade head \
    && for a in poller alerts web backup; do
      launchctl kickstart -k gui/$(id -u)/com.robgant.cat-watcher.$a
    done'\
  """
description = "Pull, install, migrate, and restart all agents on media-center"
[tool.pixi.tasks.dev]
cmd = "cat-watcher-web --reload"
description = "Run web app with reload"
[tool.pixi.tasks.fetch-clips]
cmd = "cat-watcher-poller --once --no-detect"
description = "Poll without YOLO inference"
[tool.pixi.tasks.fmt-dprint]
cmd = """\
  bash -c 'p="$1"
  shift
  if [ -d "$p" ]; then dprint "$@" "${p%/}/**"; else dprint "$@" "$p"; fi' _ "{{ path }}" {{ dprint_cmd }}\
  """
args = [ { arg = "path", default = "." }, { arg = "dprint_cmd", default = "fmt --allow-no-files" } ]
description = "dprint with the directory-recursion glob fix; pass dprint_cmd=check for dry-run"
[tool.pixi.tasks.fmt-sh]
cmd = "shfmt --write scripts/ tests/fixtures/"
description = "Format shell scripts with shfmt"
[tool.pixi.tasks.fmt-toml]
cmd = "pyproject-fmt --no-print-diff pyproject.toml"
description = "Format pyproject.toml with pyproject-fmt"
[tool.pixi.tasks.format]
cmd = """\
  bash -c 'e=0
  pyproject-fmt --no-print-diff pyproject.toml || e=$?
  shfmt --write scripts/ tests/fixtures/ || e=$?
  markdownlint --fix . || e=$?
  ruff check --fix --silent "$@" || e=$?
  ruff format "$@" || e=$?
  exit $e' _ {{ paths }}\
  """
args = [ { arg = "paths", default = "." } ]
description = "Auto-format; pass a path to scope dprint + ruff"
[[tool.pixi.tasks.format.depends-on]]
task = "fmt-dprint"
args = [ "{{ paths }}", "fmt --allow-no-files" ]
[tool.pixi.tasks.install-agents]
cmd = "bash scripts/install_launchagents.sh"
description = "Install cat-watcher launchd agents (this Mac)"
[tool.pixi.tasks.lint]
cmd = """\
  bash -c 'e=0
  ruff check "$@" || e=$?
  basedpyright "$@" || e=$?
  mypy "$@" || e=$?
  pylint "$@" || e=$?
  find scripts tests/fixtures -name "*.sh" -type f -exec shellcheck "{}" + || e=$?
  # Uncomment when we have GitHub Actions
  # actionlint || e=$?
  # zizmor .github/workflows || e=$?
  exit $e' _ {{ paths }}\
  """
args = [ { arg = "paths", default = "." } ]
description = "Run all linters; pass a path to scope the Python linters"
[tool.pixi.tasks.lint-actions]
cmd = """\
  bash -c 'e=0
  actionlint || e=$?
  zizmor .github/workflows || e=$?
  exit $e'\
  """
description = "Lint GitHub Actions workflows (actionlint + zizmor)"
[tool.pixi.tasks.lint-sh]
cmd = "bash -c \"find scripts tests/fixtures -name '*.sh' -type f -exec shellcheck '{}' +\""
description = "Lint shell scripts with shellcheck (across scripts/ and tests/fixtures/)"
[tool.pixi.tasks.outdated]
cmd = "pixi update --dry-run"
description = "Show what would be updated"
[tool.pixi.tasks.poll-once]
cmd = "cat-watcher-poller --once"
description = "One-shot poll; trailing flags forward (e.g., --since, --limit)"
[tool.pixi.tasks.test-on-mini]
cmd = "ssh media-center 'cd ~/Programming/cat-watcher && git pull && pixi install && pixi run pytest'"
description = "Pull and run pytest on media-center over SSH"
[tool.pixi.tasks.uninstall-agents]
cmd = "bash scripts/uninstall_launchagents.sh"
description = "Remove cat-watcher launchd agents (this Mac)"
[tool.pixi.workspace]
channels = [ "conda-forge" ]
platforms = [ "linux-64", "osx-64", "osx-arm64" ]

# Tool Configuration
[tool.ruff]
target-version = "py314"
line-length = 140
indent-width = 4
namespace-packages = [
  # The alembic/ tree is also a namespace package (env.py + versions/*.py are loaded by alembic, not
  # imported as a normal package).
  "alembic",
  # Test directories are PEP 420 namespace packages (no __init__.py) because pytest runs under
  # --import-mode=importlib.
  "tests",
]
src = [ "src" ]
extend-exclude = [ "*.mako", "*.md" ]
[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
[tool.ruff.lint]
select = [ "ALL" ]
ignore = [
  "D",      # pydocstyle - too verbose for strict typing focus
  "FIX002", # allow TODO comments with author and link
  "ISC001", # single-line-implicit-string-concatenation - conflicts with formatter
]
[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = [
  # Test files can use assert statements, magic values, access private members, and use late imports
  # to control import side effects around patches.
  "PLC0415",
  "PLR2004",
  "S101",
  "SLF001",
]

[tool.pylint]
load-plugins = [
  "pylint.extensions.check_elif",
  "pylint.extensions.eq_without_hash",
  "pylint.extensions.redefined_loop_name",
  "pylint.extensions.typing",
  "pylint_pytest",
  "pylint_per_file_ignores",
]
jobs = 0  # Auto-detect CPU count
[tool.pylint.basic]
good-names = [ "i", "j", "k", "v", "ex", "Run", "_", "id" ]
bad-names = [ "foo", "bar", "baz", "qux", "toto", "tutu", "tata" ]
[tool.pylint.design]
max-args = 5
max-locals = 15
max-attributes = 7
max-statements = 50
[tool.pylint.format]
max-line-length = 140
expected-line-ending-format = "LF"
# Allow long URLs/type comments to exceed line limit
ignore-long-lines = "^\\s*(# )?<?https?://\\S+>?$|\\s+# (type|pyright|pylint):"
[tool.pylint.MAIN]
init-hook = """
try: import pylint_venv
except ImportError: pass
else: pylint_venv.inithook()
"""
recursive = true
ignore = [ ".pixi" ]
[tool.pylint.messages_control]
